name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run build

      - name: Ensure dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is out of date. Run 'pnpm run build' and commit the result."
            git diff dist
            exit 1
          fi
