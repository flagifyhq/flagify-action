name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Move major-version tag
        run: |
          TAG="${GITHUB_REF##*/}"
          MAJOR="${TAG%%.*}"          # vX.Y.Z → vX
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
